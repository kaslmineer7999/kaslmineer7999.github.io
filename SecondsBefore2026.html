	<body>
		<div id="cont">
			<div id="count">
				<div id="count-inner"></div>
			</div>
			<div style="line-height: 40px; font-size: 10px;">
				Seconds Before 2026
			</div>
		</div>
		<script>
			!function() {
				var targetYear = new Date('2026').getTime();
				var countParent = document.getElementById('count-inner');
				var increase = function() {
					var start = parseFloat(countParent.style.top) || 0;
					var target = start + 80;
					var duration = 30;
					var currentTime = 0;
					var step = function(ts) {
						currentTime++;
						if(currentTime < duration) {
							id = requestAnimationFrame(step);
						};
						countParent.style.top =
							start + (target - start) *
							-(currentTime / duration) + 'px';
					};
					var id = requestAnimationFrame(step);
				};
				var count = function() {
					var currentTime = 0;
					var x = false;
					var step = function() {
						currentTime++;
						requestAnimationFrame(step);
						if(currentTime % 60 != 0) {
							return;
						};
						var elem = document.createElement('div');
						elem.innerHTML = Math.floor(
							(targetYear - Date.now()) / 1000
						);
						countParent.appendChild(elem);
						if(x) {
							increase();
						}; 
						if(!x) {
							x = true;
						};
					};
					requestAnimationFrame(step);
				};
				count();
			}();
		</script>
	</body>
